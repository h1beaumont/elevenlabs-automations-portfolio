function useCounter(target, duration = 2000, start = false) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if (!start) return;
    let startTime = null;
    const step = (ts) => {
      if (!startTime) startTime = ts;
      const p = Math.min((ts - startTime) / duration, 1);
      setCount(Math.floor(p * target));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, duration, start]);
  return count;
}

function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(20px)", transition: `all 0.6s ease ${delay}s` }}>{children}</div>;
}

                <p style={{ fontSize: "clamp(12px, 1.6vw, 14px)", lineHeight: 1.65, color: "#5a5550", margin: 0 }}>Automatic issue detection and categorization, contractor dispatch with cascading WhatsApp alerts, chase sequences for unresponsive teams, and a learning system that improves triage accuracy. Issues are categorized (plumbing, electrical, appliances, locksmith, etc.) and routed to the right contractor automatically. When contractors don't respond, escalation happens without human intervention.</p>
